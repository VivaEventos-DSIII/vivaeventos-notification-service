version: '3.8'

networks:
  notif-net:
    driver: bridge

volumes:
  pgdata-notifications:

services:

  # Base de datos del notification-service
  db-notifications:
    image: postgres:16-alpine
    container_name: notif-db
    ports:
      - "5435:5432"        # Puerto 5435 para no chocar con otros PostgreSQL
    environment:
      POSTGRES_DB: notificationdb
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata-notifications:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d notificationdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - notif-net

  # Zookeeper (requerido por Kafka)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: notif-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - notif-net

  # Kafka
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: notif-kafka
    depends_on:
      - zookeeper
    ports:
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - notif-net

  # Kafka UI — interfaz web para ver topics y publicar mensajes de prueba
  # Acceso: http://localhost:8090
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: notif-kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka
    networks:
      - notif-net